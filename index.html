<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
    <title>MNCTV Live - DASH DRM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/controls.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: black;
            touch-action: none;
            overflow: hidden;
        }
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
        }
        #video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }
        /* Custom UI Style */
        .shaka-controls-container {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="video-container" data-shaka-player-container>
        <video id="video" data-shaka-player autoplay playsinline></video>
    </div>

    <script>
    const workerUrl = "https://superhyper.asique121212.workers.dev/?proxy=";
    const manifestUrl = "https://d2xz2v5wuvgur6.cloudfront.net/out/v1/d6b026ad50f14b7f9af5ddd5450007d4/index.mpd";
    
    const drmConfig = {
        "c3004565365a42d08e3bde39a516d64e": "dbfdc0967cfbbed01dba730c99d9c14a"
    };

    async function initPlayer() {
        const video = document.getElementById('video');
        const videoContainer = document.querySelector('.video-container');
        
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, videoContainer, video);

        player.configure({
            drm: {
                clearKeys: drmConfig
            }
        });

        // FILTER DIPERBAIKI: Mencegah Double Proxy
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            const originalUrl = request.uris[0];
            
            // Hanya bungkus jika URL mengandung 'cloudfront.net' 
            // DAN belum mengandung 'workers.dev'
            if (originalUrl.includes('cloudfront.net') && !originalUrl.includes('workers.dev')) {
                request.uris[0] = workerUrl + encodeURIComponent(originalUrl);
            }
        });

        try {
            // Muat manifest pertama kali lewat worker
            await player.load(workerUrl + encodeURIComponent(manifestUrl));
            console.log("MNCTV Berhasil Dimuat!");
            video.muted = false;
        } catch (e) {
            console.error("Gagal memuat video:", e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
    document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</script>
