<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
    <title>Shaka Player - Fullscreen 16:9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/controls.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: black;
            touch-action: none;
            overscroll-behavior: contain;
        }
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
        }
        #video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: black;
        }
        /* Pastikan kontrol tetap ada saat disentuh */
        .shaka-controls-container {
            opacity: 1 !important;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <script>
        async function initPlayer() {
            const video = document.getElementById('video');
            const videoContainer = document.querySelector('.video-container');
            const ui = new shaka.ui.Overlay(new shaka.Player(video), videoContainer, video);
            const controls = ui.getControls();
            const player = controls.getPlayer();

            player.configure({
                drm: {
                    clearKeys: {
                        "3fb40d85724942f994d86943f48021db": "a6da8742502c8a2153067f5f2a70fb02"
                    }
                }
            });

            try {
                await player.load("https://mag04.tvx.prd.tv.odido.nl/wh7f454c46tw865586829_-819821292/PLTV/86/224/3221241610/3221241610.mpd?accountinfo=~~V2.0~LNS2PBO5tyhp5z1Pe6ObBA6cd7a4ec35c4492167b9376e6dff2932~BZw2dESHw-I1PQCFh9gGxCMvrIIzgMdYAe900qj8l6aoXUX9ahyR6I9EUIu7nDR4f4887615c83ea7a8cee6dd33137c4ebe:UTC,");
                console.log("Video siap diputar!");
                video.muted = false; // Auto-unmute
                video.play(); // Paksa play jika diperlukan
            } catch (e) {
                console.error("Gagal memuat video:", e);
            }

            // Pastikan kontrol muncul saat disentuh
            videoContainer.addEventListener("click", () => {
                document.querySelector(".shaka-controls-container").style.opacity = "1";
            });

            // Sembunyikan kontrol setelah beberapa detik tidak digunakan
            let timeout;
            videoContainer.addEventListener("mousemove", () => {
                clearTimeout(timeout);
                document.querySelector(".shaka-controls-container").style.opacity = "1";
                timeout = setTimeout(() => {
                    document.querySelector(".shaka-controls-container").style.opacity = "0";
                }, 3000); // Sembunyikan setelah 3 detik tidak digunakan
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initPlayer();
        });

    </script>

</body>
</html>
