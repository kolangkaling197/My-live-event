<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASH DRM ClearKey Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/controls.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 800px; }
        video { width: 100%; height: auto; }
        .info { padding: 20px; text-align: center; }
        .status { color: #0f0; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>
    <div class="info">
        <h3>Memutar: MNCTV (DASH + DRM)</h3>
        <div id="status" class="status">Menunggu inisialisasi...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.debug.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/controls.js"></script>

<script>
    // URL dari Cloudflare Worker Anda
    const manifestUri = 'https://superhyper.asique121212.workers.dev/?type=stream';
    const clearKeyString = 'c3004565365a42d08e3bde39a516d64e:dbfdc0967cfbbed01dba730c99d9c14a';

    async function initApp() {
        // Install built-in polyfills untuk kompatibilitas browser
        shaka.polyfill.installAll();

        if (shaka.Player.isBrowserSupported()) {
            initPlayer();
        } else {
            document.getElementById('status').innerText = 'Browser tidak mendukung Shaka Player!';
        }
    }

    async function initPlayer() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const player = new shaka.Player(video);
        const statusEl = document.getElementById('status');

        // Pisahkan KID dan KEY dari string
        const [kid, key] = clearKeyString.split(':');

        // Konfigurasi DRM ClearKey
        player.configure({
            drm: {
                clearKeys: {
                    [kid]: key
                }
            }
        });

        // Tambahkan Request Filter untuk menyisipkan Referer (Opsional di browser tertentu)
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            if (type == shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                type == shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                // Catatan: Browser biasanya melarang modifikasi Referer via JS karena alasan keamanan.
                // Itulah sebabnya Proxy di Cloudflare Worker sangat penting.
            }
        });

        // Listen untuk error
        player.addEventListener('error', (event) => {
            console.error('Error code', event.detail.code, 'object', event.detail);
            statusEl.innerText = 'Error: ' + event.detail.code + ' (Cek Console)';
            statusEl.style.color = 'red';
        });

        try {
            statusEl.innerText = 'Memuat Manifest...';
            await player.load(manifestUri);
            statusEl.innerText = 'Video Berhasil Dimuat!';
        } catch (e) {
            console.error('Load failed', e);
        }
    }

    document.addEventListener('shaka-ui-loaded', initApp);
    document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
