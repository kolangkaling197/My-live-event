<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/shaka-player/4.3.5/controls.css">
    <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <style>
      body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
      .video-container { width: 80%; max-width: 800px; }
    </style>
  </head>
  <body>

    <div class="video-container" data-shaka-player-container>
      <video autoplay id="video" style="width:100%;height:100%"></video>
    </div>

    <script>
      const manifestUri = 'https://dash2.antik.sk/stream/nvidia_nova_sport2/playlist_cenc.mpd';
      const clearKeyId = '11223344556677889900112233445566';
      const clearKeyValue = '4b80724d0ef86bcb2c21f7999d67739d';

      async function initApp() {
        // Install built-in polyfills to patch browser incompatibilities.
        shaka.polyfil.installAll();

        // Check to see if the browser supports the basic APIs.
        if (shaka.Player.isBrowserSupported()) {
          initPlayer();
        } else {
          console.error('Browser not supported!');
        }
      }

      async function initPlayer() {
        const video = document.getElementById('video');
        const ui = video['ui'];
        const controls = ui.getControls();
        const player = controls.getPlayer();

        // Konfigurasi ClearKey
        player.configure({
          drm: {
            clearKeys: {
              [clearKeyId]: clearKeyValue
            }
          }
        });

        // Listen for error events.
        player.addEventListener('error', onPlayerErrorEvent);
        controls.addEventListener('error', onUIErrorEvent);

        // Try to load a manifest.
        try {
          await player.load(manifestUri);
          console.log('The video has now been loaded!');
        } catch (error) {
          onPlayerError(error);
        }
      }

      function onPlayerErrorEvent(event) { onPlayerError(event.detail); }
      function onUIErrorEvent(event) { onPlayerError(event.detail); }
      function onPlayerError(error) { console.error('Error code', error.code, 'object', error); }

      document.addEventListener('shaka-ui-loaded', initApp);
      document.addEventListener('DOMContentLoaded', initApp);
    </script>
  </body>
  </html>
